name: Backend Build

# Cuándo ejecutar este workflow
on:
  push:
    branches: [ main ]
    paths: [ 'backend-springboot/**' ]  
  pull_request:
    branches: [ main ]
    paths: [ 'backend-springboot/**' ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Descargar el código del repo
      - name: Checkout código
        uses: actions/checkout@v3
      
      # 2. Instalar Java
      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      # 3. Compilar y ejecutar tests con Maven
      - name: Build con Maven
        run: |
          cd backend-springboot
          mvn clean package
      
